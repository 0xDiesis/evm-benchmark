# Sonic 4-validator fakenet for evm-benchmark comparison testing
#
# Usage:
#   docker compose up --build -d
#   ./connect-peers.sh        # form ring topology
#   ./run-bench.sh             # benchmark with our harness
#
# Cleanup:
#   docker compose down -v --remove-orphans

services:
  sonic-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sonic-node-1
    cap_add:
      - NET_ADMIN
    environment:
      - VALIDATOR_ID=1
      - VALIDATOR_COUNT=4
      - NAT_HOST=sonic-1
      - HTTP_PORT=18545
      - WS_PORT=18546
      - P2P_PORT=5050
      - CACHE_SIZE=12000
      - TXPOOL_GLOBAL_SLOTS=50000
      - TXPOOL_ACCOUNT_SLOTS=5000
      - TXPOOL_GLOBAL_QUEUE=10000
      - TXPOOL_ACCOUNT_QUEUE=1000
    ports:
      - "18545:18545"  # HTTP RPC
      - "18546:18546"  # WebSocket
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://localhost:18545 || exit 1
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 30s
    networks:
      sonic-net:
        ipv4_address: 10.101.0.11
    volumes:
      - sonic-1-data:/var/sonic

  sonic-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sonic-node-2
