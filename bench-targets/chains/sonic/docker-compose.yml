      - TXPOOL_GLOBAL_SLOTS=50000
      - TXPOOL_ACCOUNT_SLOTS=5000
      - TXPOOL_GLOBAL_QUEUE=10000
      - TXPOOL_ACCOUNT_QUEUE=1000
    ports:
      - "18645:18545"  # HTTP RPC
      - "18646:18546"  # WebSocket
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://localhost:18545 || exit 1
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 30s
    networks:
      sonic-net:
        ipv4_address: 10.101.0.12
    volumes:
      - sonic-2-data:/var/sonic

  sonic-3:
